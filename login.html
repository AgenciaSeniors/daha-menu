<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1F4060">
    <title>Acceso Gerencial | DAHA</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Caveat+Brush&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <h1 class="login-logo">DA<span class="accent">H</span>A</h1>
            <p class="login-subtitle">restaurante</p>

            <form id="login-form">
                <div class="input-group">
                    <label>Usuario</label>
                    <input type="email" id="email" class="input-stylish" placeholder="correo@ejemplo.com" required>
                </div>

                <div class="input-group">
                    <label>Contrase&ntilde;a</label>
                    <input type="password" id="password" class="input-stylish" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
                </div>

                <button type="submit" class="btn-big-action" id="btn-login">
                    INICIAR SESI&Oacute;N
                </button>

                <p id="error-msg" style="color:var(--red-danger); font-size:0.85rem; margin-top:18px; min-height:20px; font-weight:600;"></p>
            </form>

            <a href="index.html" style="color:var(--text-secondary); font-size:0.85rem; text-decoration:none; display:block; margin-top:30px; border-top:1px solid rgba(31,64,96,0.08); padding-top:18px; font-weight:600;">
                &larr; Volver al Men&uacute;
            </a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            const errorMsg = document.getElementById('error-msg');

            btn.textContent = "Verificando...";
            btn.style.opacity = "0.7";
            errorMsg.textContent = "";

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    errorMsg.textContent = "Credenciales inválidas.";
                    btn.textContent = "INICIAR SESIÓN";
                    btn.style.opacity = "1";
                } else {
                    window.location.href = "admin.html";
                }
            } catch (err) {
                errorMsg.textContent = "Error de conexión. Verifica config.js.";
                btn.textContent = "INICIAR SESIÓN";
                btn.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
