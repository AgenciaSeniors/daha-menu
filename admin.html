<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1F4060">
    <title>Panel Gerencial | DAHA</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Caveat+Brush&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body class="admin-body">

    <header class="admin-header">
        <div style="display:flex; align-items:center;">
            <h1 class="admin-title">DAHA</h1>
            <span class="admin-badge">ADMIN</span>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <a href="index.html" target="_top" style="color:var(--navy); text-decoration:none; font-size:0.85rem; cursor:pointer; padding:8px 14px; border:1.5px solid var(--mint); border-radius:50px; font-weight:600;">Ver Carta</a>
            <button onclick="cerrarSesion()" style="background:none; border:none; color:var(--red-danger); cursor:pointer;" title="Salir"><span class="material-icons">logout</span></button>
        </div>
    </header>

    <div class="dashboard-grid">
        <div class="upload-zone">
            <h3 style="margin-bottom:20px;">Gesti&oacute;n de Producto</h3>

            <form id="form-producto">
                <input type="hidden" id="edit-id">

                <div class="input-group">
                    <label>Nombre</label>
                    <input type="text" id="nombre" class="input-stylish" required>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:20px;">
                    <div class="input-group" style="margin-bottom:0;">
                        <label>Precio</label>
                        <input type="number" id="precio" class="input-stylish" required>
                    </div>
                    <div class="input-group" style="margin-bottom:0;">
                        <label>Categor&iacute;a</label>
                        <select id="categoria" class="input-stylish" required>
                            <option value="" disabled selected>Seleccionar Categor&iacute;a</option>
                            <option value="entrantes">Entrantes</option>
                            <option value="completas">Platos</option>
                            <option value="pizzas">Pizzas</option>
                            <option value="pizzas familiares">Pizzas Familiares</option>
                            <option value="spaguettis">Pastas</option>
                            <option value="bebidas">Bebidas</option>
                            <option value="postres">Postres</option>
                            <option value="agregados">Agregados</option>
                            <option value="agregados pizzas familiares">Agregados Pizzas Familiares</option>
                            <option value="plato especial">Plato Especial</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>Foto <small style="color:var(--text-muted); font-weight:normal; text-transform:none;">(Opcional al editar)</small></label>

                    <label class="file-upload-wrapper" for="imagen-file" style="cursor:pointer; position:relative; overflow:hidden; min-height:150px; display:flex; align-items:center; justify-content:center;">

                        <div id="upload-prompt" style="text-align:center; padding:20px;">
                            <span class="material-icons" style="font-size:2.2rem; color:var(--navy); margin-bottom:6px;">cloud_upload</span>
                            <span class="file-upload-text" style="display:block;">Toca para seleccionar imagen</span>
                        </div>

                        <img id="imagen-preview" src="" alt="Vista previa" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; border-radius:12px;">

                        <input type="file" id="imagen-file" accept="image/*" style="display:none;">
                    </label>
                </div>

                <div class="input-group">
                    <label>Descripci&oacute;n</label>
                    <textarea id="descripcion" class="input-stylish" rows="2"></textarea>
                </div>

                <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
                    <input type="checkbox" id="destacado" style="width:18px; height:18px; accent-color:var(--coral);">
                    <label for="destacado" style="margin:0; cursor:pointer; color:var(--text-secondary); text-transform:none; letter-spacing:0;">Marcar como "Destacado" &#11088;</label>
                </div>

                <div style="display:flex; gap:10px; align-items:center;">
                    <button type="submit" class="btn-big-action" id="btn-submit">GUARDAR PRODUCTO</button>
                    <button type="button" id="btn-cancelar" onclick="cancelarEdicion()" style="background:transparent; border:2px solid var(--text-muted); color:var(--text-secondary); padding:13px 20px; border-radius:12px; cursor:pointer; display:none; font-weight:600;">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>

        <div class="inventory-zone">
            <div style="background:var(--cream); padding:14px; border-radius:10px; margin-bottom:20px; border:1px solid rgba(31,64,96,0.08);">
                <div style="display:flex; align-items:center; gap:10px;">
                    <span style="font-size:20px;">&#128269;</span>
                    <input type="text" id="buscadorInventario" placeholder="Buscar producto en el inventario..."
                           style="width:100%; padding:10px; background:var(--white); color:var(--text-primary); border:1.5px solid var(--mint); border-radius:8px; font-size:16px; outline:none; font-family:'Poppins', sans-serif;">
                </div>
            </div>
            <h3 style="margin-bottom:20px;">Inventario</h3>
            <div id="lista-admin" class="inventory-list">
            </div>
        </div>

    </div>

    <script src="admin.js"></script>

</body>
</html>
